# YouMind Skills — 集中凭证配置
# 将此文件复制到 ~/.youmind-skill/credentials.yaml
# 所有 skill 优先读取此文件，找不到则回退到本地 config.yaml

# YouMind OpenAPI（所有 skill 共享）
youmind:
  api_key: ""              # sk-ym-xxxxxxxxxxxxxxxxxxxx
  base_url: "https://youmind.com/openapi/v1"

# --- 平台凭证 ---

wechat:
  appid: ""
  secret: ""
  author: ""

devto:
  api_key: ""

medium:
  token: ""
  publication_id: ""

x:
  bearer_token: ""
  access_token: ""
  api_key: ""
  api_secret: ""
  access_token_legacy: ""
  access_token_secret: ""

reddit:
  client_id: ""
  client_secret: ""
  username: ""
  password: ""
  user_agent: ""

wordpress:
  site_url: ""
  username: ""
  app_password: ""

facebook:
  page_id: ""
  page_access_token: ""

instagram:
  business_account_id: ""
  access_token: ""

hashnode:
  token: ""
  publication_id: ""

ghost:
  site_url: ""
  admin_api_key: ""

# 图片生成 providers
image:
  default_provider: "youmind"
  providers:
    gemini:
      api_key: ""
    openai:
      api_key: ""
    doubao:
      api_key: ""
      base_url: "https://ark.cn-beijing.volces.com/api/v3"
