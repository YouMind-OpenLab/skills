name: Publish Changed Skills to ClawHub

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need parent commit to diff

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Authenticate
        run: clawhub login --token "${{ secrets.CLAWHUB_TOKEN }}" --no-browser

      - name: Detect changed skills and publish
        run: bash scripts/ci-publish.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
