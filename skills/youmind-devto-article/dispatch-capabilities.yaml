# Dispatch Capability Manifest
# Read by youmind-article-dispatch when orchestrating multi-platform publishing.
# Contract: shared/DISPATCH_CONTRACT.md (v1.0)

contract_version: "1.0"

platform: "devto"
skill_name: "youmind-devto-article"
display_name: "Dev.to"

tagline: "Developer tutorials, OSS showcases, casual technical voice"
audience: "Software developers (junior to senior), OSS contributors, educators"

best_for:
  - "technical tutorials"
  - "tool reviews"
  - "experience reports"
  - "how-I-built narratives"
  - "deep-dive architecture"

supported_operations:
  - generate
  - adapt
  - condense
  - translate
  - localize
  - revive
  - excerpt

hard_limits:
  max_tags: 4
  tag_format: "lowercase-alphanumeric-hyphens"
  max_tag_chars: 30
  max_description_chars: 170
  recommended_cover_image: "1000x420"
  typical_word_count: "800-2500"

defaults:
  publish_mode: "draft"

auth:
  type: "youmind-openapi"
  connector_url: "https://youmind.com/settings/connector"
  local_config_required: "youmind.api_key"

references:
  platform_dna: "references/platform-dna.md"
  generation_playbook: "references/content-generation-playbook.md"
  adaptation_playbook: "references/content-adaptation-playbook.md"
