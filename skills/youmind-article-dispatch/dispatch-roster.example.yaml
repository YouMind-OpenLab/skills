# Dispatch Roster — Your active platform list
#
# This file records which platforms YOU use. When you say "帮我分发" or
# "publish everywhere", dispatch targets ONLY these platforms — not all 10.
#
# Built during onboarding. Updated when you add/remove platforms.
# Copy to dispatch-roster.yaml (auto-generated by onboarding, or create manually).

# Platforms you actively publish to.
# Dispatch targets these when you say "distribute" / "publish everywhere" / "帮我分发".
active_platforms:
  - devto
  - hashnode
  - x
  # - ghost
  # - wordpress
  # - linkedin
  # - wechat
  # - qiita

# Connection status (populated by onboarding validation, refreshed on each dispatch).
# Do NOT edit manually — dispatch updates this by calling each platform's validate endpoint.
platform_status:
  devto:
    connected: true
    last_validated: "2026-04-16T10:00:00Z"
    skill_installed: true
  hashnode:
    connected: true
    last_validated: "2026-04-16T10:00:00Z"
    skill_installed: true
  x:
    connected: true
    last_validated: "2026-04-16T10:00:00Z"
    skill_installed: true
  ghost:
    connected: false
    last_validated: null
    skill_installed: true
  wordpress:
    connected: false
    last_validated: null
    skill_installed: true
  linkedin:
    connected: false
    last_validated: null
    skill_installed: false
  wechat:
    connected: false
    last_validated: null
    skill_installed: true
  qiita:
    connected: false
    last_validated: null
    skill_installed: true

# Default dispatch behavior when user doesn't specify platforms.
defaults:
  # What "帮我分发" / "publish everywhere" means for this user.
  # Options: active_only | all_connected | ask_every_time
  broadcast_scope: "active_only"

  # Default publish mode for all platforms (individual skills may override).
  publish_mode: "draft"

  # Skip platforms that fail validation silently, or stop and ask?
  on_validation_failure: "skip_and_warn"  # skip_and_warn | stop_and_ask
