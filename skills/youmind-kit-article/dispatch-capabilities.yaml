contract_version: "1.0"

platform: "kit"
skill_name: "youmind-kit-article"
display_name: "Kit"

tagline: "Creator broadcasts, public newsletter-feed posts, inbox-first hooks"
audience: "Creators, audience-building teams, newsletter operators with a public creator profile"

best_for:
  - "creator updates"
  - "launch broadcasts"
  - "weekly digests"
  - "behind-the-scenes notes"
  - "public newsletter archive posts"

supported_operations:
  - generate
  - adapt
  - condense
  - revive
  - excerpt

hard_limits:
  subject_soft_ceiling_chars: "45-70"
  preview_text_chars: "35-120"
  typical_word_count: "400-1200"
  body_html_mode: "simple-email-safe-html"
  sender_email_confirmed_required: true

defaults:
  publish_mode: "draft"
  visibility: "public"

auth:
  type: "youmind-openapi"
  connector_url: "https://youmind.com/settings/connector"
  local_config_required: "youmind.api_key"

special_notes:
  public_url: "Kit API may not return a stable public URL even when the broadcast exists."
  private_review: "Private broadcasts should be inspected in https://app.kit.com/campaigns."

references:
  platform_dna: "references/platform-dna.md"
  generation_playbook: "references/content-generation-playbook.md"
  adaptation_playbook: "references/content-adaptation-playbook.md"
