# YouMind WeChat Skill Configuration
#
# Layered config (see /shared/YOUMIND_HOME.md):
#   1. ~/.youmind/config.yaml              — shared YouMind credentials (template: /shared/config.example.yaml)
#   2. ~/.youmind/config/youmind-wechat-article.yaml  — WeChat-specific overrides (theme, theme_color)
#   3. skills/youmind-wechat-article/config.yaml      — legacy fallback (this file)
#
# New installs should use #1 + optionally #2. This file is retained for
# pre-~/.youmind/ installs and as a complete example of all available fields.

youmind:
  api_key: ""              # sk-ym-xxxxxxxxxxxxxxxxxxxx (shared; move to ~/.youmind/config.yaml)
  base_url: "https://youmind.com/openapi/v1"

# WeChat-specific (safe to commit — not credentials)
theme: "simple"             # simple | center | decoration | prominent
theme_color: "#3498db"      # Any HEX color or preset name
