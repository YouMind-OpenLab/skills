# YouMind WeChat Skill Configuration
#
# Canonical layered config (see shared/YOUMIND_HOME.md):
#   1. ~/.youmind/config.yaml                         — shared YouMind credentials
#   2. ~/.youmind/config/youmind-wechat-article.yaml — WeChat-specific overrides
#
# Article skills no longer read this repo-local file.
# It is kept only as a full field example.

youmind:
  api_key: ""              # sk-ym-xxxxxxxxxxxxxxxxxxxx (shared; move to ~/.youmind/config.yaml)
  base_url: "https://youmind.com/openapi/v1"

# WeChat-specific (safe to commit — not credentials)
theme: "simple"             # simple | center | decoration | prominent
theme_color: "#3498db"      # Any HEX color or preset name
